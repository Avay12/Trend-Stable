<div class="max-w-5xl mx-auto py-8 space-y-8" *ngIf="paymentDetails">
  <div class="bg-[#1a2035] border-none rounded-2xl w-full p-6 lg:p-10 shadow-xl">
    <div class="flex items-center justify-between mb-8 pb-4 border-b border-white/5">
      <h2 class="font-display text-2xl font-bold text-white">Payment Details</h2>
      <button (click)="onDone()"
        class="inline-flex items-center justify-center whitespace-nowrap text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-white hover:bg-primary/80 h-10 rounded-lg px-8">
        Done
      </button>
    </div>

    <div class="space-y-0 text-sm">
      <div
        class="grid grid-cols-[100px_1fr] sm:grid-cols-[200px_1fr] lg:grid-cols-[280px_1fr] items-center py-6 border-b border-white/5 gap-4">
        <span class="text-slate-400">Order ID</span>
        <span class="font-mono text-white/90 break-all">{{paymentDetails.order_id}}</span>
      </div>

      <div
        class="grid grid-cols-[100px_1fr] sm:grid-cols-[200px_1fr] lg:grid-cols-[280px_1fr] items-center py-6 border-b border-white/5 gap-4">
        <span class="text-slate-400">Cryptocurrency</span>
        <span class="font-medium text-white/90">{{paymentDetails.pay_currency}}</span>
      </div>

      <div
        class="grid grid-cols-[100px_1fr] sm:grid-cols-[200px_1fr] lg:grid-cols-[280px_1fr] items-center py-6 border-b border-white/5 gap-4">
        <span class="text-slate-400">Amount</span>
        <div class="flex items-center justify-between w-full">
          <span class="font-semibold text-white">{{paymentDetails.pay_amount}}</span>
          <button (click)="copyToClipboard(paymentDetails.pay_amount?.toString())"
            class="text-slate-400 hover:text-white transition-colors p-1.5 rounded-md hover:bg-white/5">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
              <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
            </svg>
          </button>
        </div>
      </div>

      <div
        class="grid grid-cols-[100px_1fr] sm:grid-cols-[200px_1fr] lg:grid-cols-[280px_1fr] items-center py-6 border-b border-white/5 gap-4">
        <span class="text-slate-400">Address</span>
        <div class="flex items-center justify-between w-full overflow-hidden gap-2">
          <span class="font-mono text-white/90 truncate">{{paymentDetails.address}}</span>
          <button (click)="copyToClipboard(paymentDetails.address)"
            class="text-slate-400 hover:text-white transition-colors p-1.5 rounded-md hover:bg-white/5 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
              <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
            </svg>
          </button>
        </div>
      </div>

      <div
        class="grid grid-cols-[100px_1fr] sm:grid-cols-[200px_1fr] lg:grid-cols-[280px_1fr] items-center py-6 border-b border-white/5 gap-4">
        <span class="text-slate-400">Status</span>
        <div class="flex justify-start">
          <button (click)="onCheck()"
            class="inline-flex items-center justify-center gap-2 whitespace-nowrap text-xs font-bold transition-colors border-none !bg-yellow-600 h-8 rounded-md px-4 text-white hover:!bg-yellow-700 uppercase cursor-pointer">
            CHECK
          </button>
        </div>
      </div>

      <div class="grid grid-cols-[100px_1fr] sm:grid-cols-[200px_1fr] lg:grid-cols-[280px_1fr] items-start py-8 gap-4">
        <span class="text-slate-400 mt-2">QR Code</span>
        <div class="flex justify-start">
          <div class="bg-white p-3 rounded-xl inline-block">
            <img [src]="paymentDetails.qr_code" alt="Payment QR Code" class="w-48 h-48 sm:w-56 sm:h-56 object-contain">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
