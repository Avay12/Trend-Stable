<div class="payment-status-container">
  <div class="status-card" [ngClass]="status()">

    <!-- Success State -->
    <div *ngIf="status() === 'success'" class="content success">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-check-circle">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
          <path d="m9 11 3 3L22 4" />
        </svg>
      </div>
      <h1>Payment Successful!</h1>
      <p>Thank you for your payment. Your transaction has been completed successfully.</p>
      <div class="actions">
        <button (click)="goToDashboard()" class="btn-primary">Go to Dashboard</button>
        <button routerLink="/dashboard/order/history" class="btn-secondary">View Orders</button>
      </div>
    </div>

    <!-- Cancelled State -->
    <div *ngIf="status() === 'cancelled'" class="content cancelled">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-x-circle">
          <circle cx="12" cy="12" r="10" />
          <path d="m15 9-6 6" />
          <path d="m9 9 6 6" />
        </svg>
      </div>
      <h1>Payment Cancelled</h1>
      <p>The payment process was cancelled or failed. No changes were made to your account.</p>
      <div class="actions">
        <button (click)="tryAgain()" class="btn-primary">Try Again</button>
        <button (click)="goToDashboard()" class="btn-secondary">Back to Dashboard</button>
      </div>
    </div>

    <!-- Pending/Default State -->
    <div *ngIf="status() === 'pending'" class="content pending">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-loader-2 animate-spin">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
      </div>
      <h1>Processing...</h1>
      <p>Please wait while we verify the payment status.</p>
    </div>

  </div>
</div>
