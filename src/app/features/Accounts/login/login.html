<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-b from-background via-background to-background"></div>
    <div
      class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-primary/5 via-transparent to-transparent">
    </div>
    <div
      class="absolute top-1/4 left-1/4 w-[200px] h-[200px] md:w-[400px] md:h-[400px] rounded-full bg-primary/5 blur-[80px]">
    </div>
    <div
      class="absolute bottom-1/4 right-1/4 w-[150px] h-[150px] md:w-[300px] md:h-[300px] rounded-full bg-accent/5 blur-[60px]">
    </div>
  </div>
  <div class="w-full max-w-md relative z-10" style="opacity: 1; transform: none;"><a
      class="inline-flex items-center gap-2 text-muted-foreground hover:text-primary transition-colors mb-6 group"
      routerLink="/">
      <div><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-arrow-left w-4 h-4">
          <path d="m12 19-7-7 7-7"></path>
          <path d="M19 12H5"></path>
        </svg></div><span class="group-hover:underline">Back to home</span>
    </a>
    <div class="relative" style="opacity: 1; transform: none;">
      <div
        class="absolute -inset-1 bg-gradient-to-r from-primary/20 via-accent/20 to-primary/20 rounded-3xl blur-xl opacity-50 pointer-events-none">
      </div>
      <div
        class="border text-card-foreground relative backdrop-blur-xl bg-card/80 border-border/30 shadow-2xl shadow-black/20 rounded-2xl overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary via-accent to-primary"></div>
        <div class="flex flex-col space-y-1.5 p-6 text-center pt-8 pb-4">
          <div style="transform: none;"><a class="inline-block" routerLink="/"><span
                class="font-display text-3xl font-bold gradient-text animate-pop-up"
                style="transform: none;">SmmStable</span></a>
          </div>
          <div class="mt-4" style="opacity: 1; transform: none;">
            <div
              class="w-14 h-14 rounded-2xl bg-gradient-to-br from-primary/20 to-accent/20 border border-primary/20 flex items-center justify-center mx-auto animate-pop-up delay-100">
              <div style="transform: rotate(-0.146259deg);"><svg xmlns="http://www.w3.org/2000/svg" width="24"
                  height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sparkles w-7 h-7 text-primary">
                  <path
                    d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z">
                  </path>
                  <path d="M20 3v4"></path>
                  <path d="M22 5h-4"></path>
                  <path d="M4 17v2"></path>
                  <path d="M5 18H3"></path>
                </svg></div>
            </div>
          </div>
          <div style="opacity: 1;">
            <h3 class="font-semibold tracking-tight font-display text-2xl mt-4 animate-pop-up delay-200">Welcome Back
            </h3>
            <p class="text-sm mt-2 text-muted-foreground animate-pop-up delay-300">Sign in to access your dashboard</p>
          </div>
        </div>
        <div class="p-6 pt-0 px-6 pb-8">
          <form class="space-y-5" [formGroup]="loginForm" (ngSubmit)="handleSignIn()">
            <div class="space-y-2 animate-slide-in-left delay-400" style="opacity: 1; transform: none;"><label
                class="peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-sm font-medium"
                for="email">Email</label>
              <div class="relative group">
                <div
                  class="absolute inset-0 bg-gradient-to-r from-primary/10 to-accent/10 rounded-xl opacity-0 group-focus-within:opacity-100 transition-opacity -m-0.5 pointer-events-none">
                </div>
                <div
                  class="absolute left-3 top-[65%] -translate-y-1/2 text-muted-foreground group-focus-within:text-primary transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-mail w-4 h-4">
                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                  </svg>
                </div><input type="email"
                  class="flex w-full border px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-10 bg-background/50 border-border/50 focus:border-primary/50 transition-all rounded-xl h-12"
                  id="email" placeholder="your@email.com" formControlName="email" autocomplete="email" name="email"
                  [ngClass]="{'border-red-500': isSubmitted && formControls['email'].errors, 'border-gray-700': !isSubmitted || !formControls['email'].errors}"
                  required>
                @if(isSubmitted && formControls['email'].errors?.['required']){
                <div class="text-red-500 text-xs sm:text-sm mt-0.5 sm:mt-1">
                  Email is required
                </div>
                }
              </div>
            </div>
            <div class="space-y-2 animate-slide-in-left delay-500" style="opacity: 1; transform: none;"><label
                class="peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-sm font-medium"
                for="password">Password</label>
              <div class="relative group">
                <div
                  class="absolute inset-0 bg-gradient-to-r from-primary/10 to-accent/10 rounded-xl opacity-0 group-focus-within:opacity-100 transition-opacity -m-0.5 pointer-events-none">
                </div>
                <div
                  class="absolute left-3 top-[65%] -translate-y-1/2 text-muted-foreground group-focus-within:text-primary transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-key-round w-4 h-4">
                    <path
                      d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z">
                    </path>
                    <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle>
                  </svg>
                </div><input [type]="showPassword ? 'text' : 'password'"
                  class="flex w-full border px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-10 pr-10 bg-background/50 border-border/50 focus:border-primary/50 transition-all rounded-xl h-12"
                  id="password" placeholder="••••••••" formControlName="password" autocomplete="password"
                  name="password"
                  [ngClass]="{'border-red-500': isSubmitted && formControls['password'].errors, 'border-gray-700': !isSubmitted || !formControls['password'].errors}">
                @if(isSubmitted && formControls['password'].errors?.['required']){
                <div class="text-red-500 text-xs sm:text-sm mt-0.5 sm:mt-1">
                  Password is required
                </div>
                }

                <button title="Show Password" type="button" (click)="togglePassword()"
                  class="absolute right-3 md:top-[65%] sm:top-[72%] -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors">
                  @if (!showPassword) {
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-eye w-4 h-4">
                    <path
                      d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0">
                    </path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-eye-off w-4 h-4">
                    <path
                      d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49">
                    </path>
                    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"></path>
                    <path
                      d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143">
                    </path>
                    <path d="m2 2 20 20"></path>
                  </svg>
                  }
                </button>
              </div>
            </div>
            <button type="button" class="text-sm text-primary hover:text-primary/80 transition-colors">Forgot
              Password?</button>
            <div style="opacity: 1; transform: none;" class="animate-slide-in-left delay-600"><button
                class="inline-flex items-center justify-center gap-2 whitespace-nowrap ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg]:size-4 [&amp;_svg]:shrink-0 bg-primary text-primary-foreground hover:bg-primary/90 px-4 py-2 w-full h-12 rounded-xl text-base font-medium shadow-lg shadow-primary/20 hover:shadow-primary/30 transition-shadow"
                type="submit">Sign In</button></div>
            <div class="relative my-6">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-border/50"></div>
              </div>
              <div class="relative flex justify-center text-xs uppercase"><span
                  class="bg-card/80 px-4 text-muted-foreground">Or continue with</span></div>
            </div>
            <div style="opacity: 1; transform: none;"><button (click)="continueWithGoogle()"
                class="inline-flex items-center justify-center whitespace-nowrap text-sm font-medium ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg]:size-4 [&amp;_svg]:shrink-0 border hover:text-accent-foreground px-4 py-2 w-full h-12 rounded-xl gap-3 bg-primary/50 border-border/50 hover:bg-primary/80 hover:border-primary/30 transition-all"
                type="button"><svg class="w-5 h-5" viewBox="0 0 24 24">
                  <path fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z">
                  </path>
                  <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z">
                  </path>
                  <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z">
                  </path>
                  <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z">
                  </path>
                </svg>Continue with Google</button></div>
            <div class="pt-2" style="opacity: 1;">
              <p class="text-center text-sm text-muted-foreground">Don't have an account? <a
                  class="text-primary hover:text-primary/80 font-medium transition-colors" routerLink="/signup">Sign
                  Up</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
