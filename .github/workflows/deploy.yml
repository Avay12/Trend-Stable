name: Deploy Angular App to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Cache Angular build
        uses: actions/cache@v3
        with:
          path: |
            .angular/cache
            node_modules
            dist
          key: ${{ runner.os }}-angular-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-build-

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --configuration=production

      - name: Verify local build
        run: |
          ls -la dist/SmmStable/browser/
          [ -f dist/SmmStable/browser/index.html ] || (echo "index.html missing in build!" && exit 1)

      - name: Backup current app on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            timestamp=$(date +%Y%m%d_%H%M%S)
            echo "Creating backup of current Angular app..."
            if [ -d "/var/www/trendstable" ]; then
              sudo mkdir -p /var/www/backups
              sudo tar -czf "/var/www/backups/trendstable_backup_$timestamp.tar.gz" -C /var/www trendstable
              echo "Backup created: /var/www/backups/trendstable_backup_$timestamp.tar.gz"
            else
              echo "No existing Angular app found, skipping backup"
            fi

      - name: Prepare target directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Preparing /var/www/trendstable..."
            sudo mkdir -p /var/www/trendstable
            sudo chown -R $USER:www-data /var/www/trendstable
            sudo chmod -R 775 /var/www/trendstable
            echo "Directory ready for deployment"

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/SmmStable/browser/*"
          target: "/var/www/trendstable"
          strip_components: 3
          overwrite: true
          rm: true

      - name: Verify remote deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Verifying deployed files..."
            ls -la /var/www/trendstable
            [ -f /var/www/trendstable/index.html ] || (echo "index.html missing on server!" && exit 1)
            echo "Files verified successfully"

      - name: Set production permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Setting production permissions..."
            sudo chown -R www-data:www-data /var/www/trendstable
            sudo chmod -R 755 /var/www/trendstable
            sudo find /var/www/trendstable -type d -exec chmod 755 {} \;
            sudo find /var/www/trendstable -type f -exec chmod 644 {} \;
            echo "Permissions set"

      - name: Reload NGINX (no cert checks)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Reloading NGINX (no certificate verification)..."
            sudo nginx -t || echo "Ignoring certificate test errors"
            sudo systemctl reload nginx
            echo "NGINX reloaded successfully"

